name: lint-org-config

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - README.md
      - profile/README.md
      - .github/copilot-instructions.md
      - .github/instructions/**
      - docs/skills/**
      - scripts/family-manifest.yml
      - .github/workflows/lint-org-config.yml
      - .github/workflows/reconcile-family-table.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-org-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Lint org config
        shell: pwsh
        run: ./scripts/lint-org-config.ps1
