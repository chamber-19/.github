name: lint-org-config

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-org-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint org config
        shell: pwsh
        run: ./scripts/lint-org-config.ps1
