name: Fix Tailwind canonical vars

on:
  workflow_call:
    secrets:
      ORG_BOT_APP_ID:
        required: true
      ORG_BOT_APP_PRIVATE_KEY:
        required: true
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target_repo:
          - chamber-19/Glyphic
          - chamber-19/block-library
          - chamber-19/launcher
          - chamber-19/transmittal-builder
          - chamber-19/Drawing-List-Manager

    steps:
      - uses: actions/checkout@v4

      - name: Validate app secrets
        run: |
          set -euo pipefail
          [[ -n "${ORG_BOT_APP_ID:-}" ]] || { echo "Missing ORG_BOT_APP_ID" >&2; exit 1; }
          [[ -n "${ORG_BOT_APP_PRIVATE_KEY:-}" ]] || { echo "Missing ORG_BOT_APP_PRIVATE_KEY" >&2; exit 1; }
        env:
          ORG_BOT_APP_ID: ${{ secrets.ORG_BOT_APP_ID }}
          ORG_BOT_APP_PRIVATE_KEY: ${{ secrets.ORG_BOT_APP_PRIVATE_KEY }}

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ORG_BOT_APP_ID }}
          private-key: ${{ secrets.ORG_BOT_APP_PRIVATE_KEY }}
          owner: chamber-19

      - name: Apply Tailwind canonicalization and create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ matrix.target_repo }}
        run: |
          set -euo pipefail

          BRANCH_NAME="auto/tailwind-canonical-vars"
          WORK_DIR="$(mktemp -d)"
          TARGET_DIR="$WORK_DIR/repo"

          git config --global user.name "chamber-19[bot]"
          git config --global user.email "chamber-19[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" "$TARGET_DIR"
          cd "$TARGET_DIR"

          DEFAULT_BRANCH="$(gh repo view "$TARGET_REPO" --json defaultBranchRef -q '.defaultBranchRef.name')"
          git checkout -B "$BRANCH_NAME" "origin/$DEFAULT_BRANCH"
          node "$GITHUB_WORKSPACE/scripts/fix-tailwind-canonical-vars.mjs" "$TARGET_DIR"

          if git diff --quiet; then
            echo "No changes for ${TARGET_REPO}"
            exit 0
          fi

          git add .
          git commit -m "chore: canonicalize Tailwind CSS variable classes"
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "PR already exists for ${TARGET_REPO}#${BRANCH_NAME}"
            exit 0
          fi

          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<'EOF'
          Automated maintenance update from chamber-19/.github.

          - Canonicalizes Tailwind variable class syntax:
            - `bg-[var(--x)]` -> `bg-(--x)`
            - `text-[var(--x)]` -> `text-(color:--x)`

          Generated by `fix-tailwind-canonical-vars.yml`.
          EOF

          gh pr create \
            --repo "$TARGET_REPO" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore: canonicalize Tailwind CSS variable classes" \
            --body-file "$BODY_FILE"
