# Curated source of truth for the chamber-19 org family tables.
# Add new repos here when they're created. Mark deprecated repos with status: archived.
#
# The reconciler:
#   - VERIFIES every entry against live GitHub repo metadata
#   - REGENERATES the tables in profile/README.md and .github/copilot-instructions.md
#   - FAILS if reality and manifest disagree

version: 1

repos:
