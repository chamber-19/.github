table_targets:
  profile:
    file: profile/README.md
    columns: [Repo, Role]
    repo_link: "[`{name}`](https://github.com/chamber-19/{name})"
  copilot:
    file: .github/copilot-instructions.md
    columns: [Repo, Role, Stack]
    repo_link: "`{name}`"
